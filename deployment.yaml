apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-cicd-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-cicd-app
  template:
    metadata:
      labels:
        app: flask-cicd-app
    spec:
      containers:
        - name: flask-cicd-app
          image: 857721770242.dkr.ecr.ap-south-1.amazonaws.com/flask-cicd-app:latest
          ports:
            - containerPort: 5050